name: Quarto Publish

on:
  push:
    branches: [ main, master ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.5.56

      - name: Install TinyTeX
        run: quarto install tinytex

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt
          pip install jupyter

      - name: Render Full Book
        run: quarto render --to all
        
      - name: Render Dashboard
        run: |
          # 1. Render the file (it will create dashboard/fdi_dashboard.html)
          quarto render dashboard/fdi_dashboard.qmd
          
          # 2. Move the HTML and its supporting files to the _book folder
          cp dashboard/fdi_dashboard.html _book/
          
          # 3. If the dashboard has a 'dashboard_files' folder, move that too
          if [ -d "dashboard/fdi_dashboard_files" ]; then
            cp -r dashboard/fdi_dashboard_files _book/
          fi

      - name: Render Standalone Chapter PDFs
        run: quarto render --profile individual --to pdf

      - name: Move PDFs to Book Folder
        run: |
          # 1. Create the folder inside the web-ready directory
          mkdir -p _book/standalone-pdfs
          
          # 2. Copy the rendered PDFs into that folder
          cp -r standalone-pdfs/chapters/*.pdf _book/standalone-pdfs/
          
          # 3. Ensure a .nojekyll file exists so GitHub doesn't hide the folder
          touch _book/.nojekyll

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          # ADD THESE TWO LINES BELOW
          render: false
          path: _book
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}